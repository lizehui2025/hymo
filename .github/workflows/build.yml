name: Build Hymo

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches:
      - main
  workflow_dispatch: {}
  repository_dispatch:
    types: [build-lkm]

jobs:
  build-lkm:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type != 'tag' && !contains(github.event.head_commit.message, '[skip ci]'))
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    runs-on: ubuntu-latest
    container:
          image: ghcr.io/ylarod/ddk:${{ matrix.kmi }}-20251104
          options: --privileged
    env:
          HYMOFS_REPO: Anatdx/HymoFS
          HYMOFS_REF: ${{ github.event.inputs.hymofs_ref || github.event.client_payload.ref || 'main' }}
          TARGET_ARCH: arm64
          KMI: ${{ matrix.kmi }}
          OUT: ${{ github.workspace }}/out
          SRC_ROOT: ${{ github.workspace }}/hymofs_src
          SRC: ${{ github.workspace }}/hymofs_src/src
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        

      - name: Validate target arch
        run: |
          if [ "$TARGET_ARCH" != "arm64" ]; then
            echo "DDK workflow currently supports arm64 only, got: $TARGET_ARCH"
            exit 1
          fi

      - name: Clone HymoFS
        run: |
          set -euo pipefail
          echo "Cloning HymoFS (ref: ${{ env.HYMOFS_REPO }})..."
          git clone --depth 1 "https://github.com/${{ env.HYMOFS_REPO }}.git" "$SRC_ROOT"
          (
            cd "$SRC_ROOT"
            git fetch --depth 1 origin "${{ env.HYMOFS_REF }}"
            git checkout FETCH_HEAD
          )
          ls -la "$SRC/"

      - name: Generate version
        id: parse_version
        run: |
          git config --global --add safe.directory '*'
          COMMIT_NUM=$(git rev-list --count HEAD)
          VERSION=$((COMMIT_NUM + 200))
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build hymofs_lkm.ko
        run: |
          set -euo pipefail
          if [ -z "${KDIR:-}" ] || [ ! -f "$KDIR/Makefile" ]; then
            echo "KDIR is not available inside DDK container: ${KDIR:-<empty>}"
            exit 1
          fi

          VERSION="${{ steps.parse_version.outputs.VERSION }}"
          echo "Building hymofs_lkm.ko with KDIR=$KDIR"
          (
            cd "$SRC_ROOT"
            make -j"$(nproc --all)" CC=clang \
              CFLAGS_MODULE="-DHYMOFS_VERSION=\\\"0.1.${VERSION}\\\""
          )

          mkdir -p "$OUT"
          KO_FILE="${KMI}_${TARGET_ARCH}_hymofs_lkm.ko"
          cp "$SRC/hymofs_lkm.ko" "$OUT/$KO_FILE"
          llvm-strip -d "$OUT/$KO_FILE" 2>/dev/null || true
          ls -la "$OUT/"

      - name: Upload .ko
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.kmi }}_${{env.TARGET_ARCH }}_hymofs_lkm.ko
          path: ${{ env.OUT }}/${{ matrix.kmi }}_${{ env.TARGET_ARCH }}_hymofs_lkm.ko

  build-hymod:
    needs: [build-lkm]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type != 'tag' && !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download LKM artifacts for arm64-v8a
        uses: actions/download-artifact@v4
        with:
          pattern: '*_arm64_hymofs_lkm.ko'
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p assets
          find . -name "*.ko" -path "*hymofs_lkm*" -exec cp {} assets/ \;
          ls -la assets/

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
        id: setup-ndk

      - name: Setup CMake, Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-hymod-${{ runner.os }}-ndkr25c-arm64-v8a-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.cpp', 'src/**/*.h', 'src/**/*.hpp') }}
          restore-keys: |
            ccache-hymod-${{ runner.os }}-ndkr25c-arm64-v8a-

      - name: Cache CMake build (hymod)
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-hymod-${{ runner.os }}-ndkr25c-arm64-v8a-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.cpp', 'src/**/*.h', 'src/**/*.hpp') }}
          restore-keys: |
            cmake-hymod-${{ runner.os }}-ndkr25c-arm64-v8a-

      - name: Ensure cache dirs exist (avoid "Path does not exist" on save)
        run: mkdir -p ~/.ccache build

      - name: Build hymod
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p build/out
          cmake -B "build/arm64-v8a" \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="arm64-v8a" \
            -DANDROID_PLATFORM=android-30 \
            -DBUILD_WEBUI=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            .
          cmake --build "build/arm64-v8a"
          cp "build/arm64-v8a/hymod-arm64-v8a" "build/out/"
          ls -la build/out/

      - name: Upload hymod artifact
        uses: actions/upload-artifact@v4
        with:
          name: hymod-arm64-v8a
          path: build/out/hymod-arm64-v8a

  build:
    needs: [build-lkm, build-hymod]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type != 'tag' && !contains(github.event.head_commit.message, '[skip ci]'))

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download hymod artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hymod-*
          merge-multiple: true

      - name: Read latest HymoFS commit info
        env:
          HYMOFS_REPO: Anatdx/HymoFS
          HYMOFS_REF: ${{ github.event.inputs.hymofs_ref || github.event.client_payload.ref || 'main' }}
        run: |
          echo "Fetching HymoFS (ref: ${HYMOFS_REF}) for commit info..."
          git clone --depth 1 "https://github.com/${HYMOFS_REPO}.git" _hymofs_info
          (cd _hymofs_info && git fetch --depth 1 origin "${HYMOFS_REF}" && git checkout FETCH_HEAD)
          HYMOFS_SHA=$(cd _hymofs_info && git rev-parse HEAD)
          HYMOFS_MSG=$(cd _hymofs_info && git log -1 --format=%B)
          echo "HYMOFS_SHA=$HYMOFS_SHA" >> $GITHUB_ENV
          echo "HYMOFS_COMMIT_MESSAGE<<EOF" >> $GITHUB_ENV
          echo "$HYMOFS_MSG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          rm -rf _hymofs_info
          echo "HymoFS commit: $HYMOFS_SHA"

      - name: Merge hymod artifacts into build/out
        run: |
          mkdir -p build/out
          [ -f "hymod-arm64-v8a/build/out/hymod-arm64-v8a" ] && cp -f "hymod-arm64-v8a/build/out/hymod-arm64-v8a" build/out/

          # fallback: find hymod binaries anywhere (merge may put build/out/hymod-* directly)
          src=$(find . -name "hymod-arm64-v8a" -type f 2>/dev/null | head -1)
          [ -n "$src" ] && [ ! -f "build/out/hymod-arm64-v8a" ] && cp -f "$src" build/out/
          ls -la build/out/

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
        id: setup-ndk

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install WebUI Dependencies
        run: |
          cd webui
          npm install

      - name: Setup CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Set version (tag = Version Name, versionCode = Commit Count)
        run: |
          git fetch origin main --tags 2>/dev/null || true
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_HASH=$(git rev-parse --short=8 HEAD)
          VERSION_TAG=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
          echo "SHORT_HASH=$SHORT_HASH" >> $GITHUB_ENV
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> $GITHUB_ENV
          echo "MODULE_VERSION=$VERSION_TAG" >> $GITHUB_ENV
          sed -i "s/^version=.*/version=${VERSION_TAG}/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=${COMMIT_COUNT}/" module/module.prop
          jq --arg v "$VERSION_TAG" --argjson c "$COMMIT_COUNT" '.version = $v | .versionCode = c' update.json > update.json.tmp && mv update.json.tmp update.json
          echo "Building version: $VERSION_TAG (versionCode=$COMMIT_COUNT), zip: hymo-${VERSION_TAG}-${SHORT_HASH}.zip"

      - name: Build Project
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
          HYMOD_FROM_ARTIFACTS: "1"
        run: |
          echo "NDK Path: $ANDROID_NDK"
          ./build.sh init
          ./build.sh package

      - name: Rename to hymo-vx.x.x-xxxxxxxx.zip
        run: |
          cd build/out
          TARGET="hymo-${VERSION_TAG}-${SHORT_HASH}.zip"
          for file in *.zip; do
            [ -f "$file" ] && [ "$file" != "$TARGET" ] && mv "$file" "$TARGET"
            break
          done
          ls -la

      - name: Import GPG key
        if: github.actor == 'Anatdx'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          gpg --batch --import <<< "$GPG_PRIVATE_KEY"
          gpg --list-secret-keys --keyid-format long
      
      - name: Sign Module with GPG
        if: github.actor == 'Anatdx'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd build/out
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "Signing $ZIP_FILE..."
          gpg --detach-sign --local-user 0x942F2C75D1DC540F --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --output "$ZIP_FILE.asc" "$ZIP_FILE"
          if [ -f "$ZIP_FILE.asc" ]; then
            echo "Signature created successfully:"
            ls -lh "$ZIP_FILE.asc"
          else
            echo "Error: Signature file not created!"
            exit 1
          fi

      - name: Sign all LKM .ko files with GPG
        if: github.actor == 'Anatdx'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for ko in module/lkm/*.ko; do
            [ -f "$ko" ] || continue
            name=$(basename "$ko")
            echo "Signing $name..."
            gpg --detach-sign --local-user 0x942F2C75D1DC540F --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --output "build/out/${name}.asc" "$ko"
          done
          ls -la build/out/*.ko.asc 2>/dev/null || echo "No .ko.asc files"

      - name: Sign all hymod binaries with GPG
        if: github.actor == 'Anatdx'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for bin in build/out/hymod-arm64-v8a build/out/hymod-armeabi-v7a build/out/hymod-x86_64; do
            [ -f "$bin" ] || continue
            echo "Signing $(basename $bin)..."
            gpg --detach-sign --local-user 0x942F2C75D1DC540F --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --output "${bin}.asc" "$bin"
          done
          ls -la build/out/hymod-*.asc 2>/dev/null || echo "No hymod.asc files"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hymo-${{ env.MODULE_VERSION }}
          path: |
            build/out/*.zip
            build/out/*.asc
          if-no-files-found: error

      - name: "📤 Upload to telegram | 上传至Telegram群组"
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "BOT_TOKEN/CHAT_ID not set, skipping."
            exit 0
          fi
          echo "📤 正在上传到Telegram..."
          pip3 install telethon
          ZIP=$(ls build/out/*.zip 2>/dev/null | head -1)
          FILES="$ZIP"
          [ -f "${ZIP}.asc" ] && FILES="$FILES ${ZIP}.asc"
          python3 ${{ github.workspace }}/script/hymobot.py $FILES
          echo "✅ 文件已上传到Telegram"
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          # 展示 HymoFS 最新提交（build 里已读取）；无则展示 hymo 的
          COMMIT_URL: ${{ env.HYMOFS_SHA && format('{0}/Anatdx/HymoFS/commit/{1}', github.server_url, env.HYMOFS_SHA) || format('{0}/{1}/commit/{2}', github.server_url, github.repository, github.sha) }}
          COMMIT_MESSAGE: ${{ env.HYMOFS_COMMIT_MESSAGE || github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: "Hymo Build"
          VERSION: ${{ env.MODULE_VERSION }}
          BRANCH: ${{ github.ref_name }} 
